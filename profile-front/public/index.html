<!DOCTYPE html>
<html lang="kr">
  <head>
    <meta charset="utf-8" />

    <title>Molumn Profile</title>

    <meta data-rh="true" property="og:title" content="Molumn Profile">
    <meta data-rh="true" property="og:description" content="profile webpage of @molumn">
    <meta data-rh="true" name="description" content="profile webpage of @molumn">
    <link data-rh="true" rel="icon" type="image/png" href="img/ONCE-Logo.png">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="apple-touch-icon" href="img/NING-BASE.png" />


    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('%PUBLIC_URL%/serviceWorker.js')
                .then((reg) => {
                  console.log('service worker had installed', reg);
                })
      }
    </script>

  </head>
  <body>
    <div id="preset"></div>
    <div id="root"></div>
  </body>
</html>
